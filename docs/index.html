<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kyren — engineer & private">
    <title>Kyren</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Kyren">
    <meta property="og:description" content="Kyren — engineer & private">
    <meta property="og:url" content="https://kyreeeene.github.io/kyreeeene_info/">
    <meta property="og:image" content="https://kyreeeene.github.io/kyreeeene_info/images/profile_image.jpg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@kyreeeene">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; }

        .entry {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .pane {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
            overflow: hidden;
            transition: flex 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .entry:hover .pane { flex: 0.85; }
        .entry .pane:hover { flex: 1.3; }

        .pane .corner {
            position: absolute;
            top: 1.6rem;
            left: 1.8rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .pane .title {
            font-size: clamp(3rem, 9vw, 6.5rem);
            letter-spacing: -0.02em;
            line-height: 1;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pane:hover .title { transform: translateY(-6px); }

        .pane .subtitle {
            margin-top: 1.4rem;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            opacity: 0.85;
        }

        .pane .enter {
            position: absolute;
            bottom: 2.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .pane:hover .enter { opacity: 1; transform: translateY(0); }

        /* engineer side */
        .pane.engineer {
            background: #0a0a0c;
            color: #e6e6e8;
            font-family: 'JetBrains Mono', monospace;
        }
        .pane.engineer::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 40%, rgba(125,211,252,0.08), transparent 55%),
                radial-gradient(circle at 70% 80%, rgba(125,211,252,0.04), transparent 55%);
            transition: opacity 0.7s ease;
            pointer-events: none;
        }
        .pane.engineer:hover::before { opacity: 1.2; }
        .pane.engineer .corner { color: #7dd3fc; }
        .pane.engineer .title { font-weight: 500; }
        .pane.engineer .subtitle { color: #8a8a93; }
        .pane.engineer .enter { color: #7dd3fc; }

        /* private side */
        .pane.private {
            background: linear-gradient(120deg, #e7d3b8, #e7e0d8);
            color: #4a2a00;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .pane.private::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 70% 40%, rgba(193,112,0,0.10), transparent 55%);
            pointer-events: none;
        }
        .pane.private .corner { color: #a05d00; }
        .pane.private .title { font-weight: 700; color: #4a2a00; }
        .pane.private .subtitle { color: #8a5a18; }
        .pane.private .enter { color: #a05d00; }

        /* divider */
        .entry::after {
            content: "";
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 768px) {
            html, body { overflow: auto; }
            .entry { flex-direction: column; height: auto; }
            .pane { min-height: 50vh; padding: 4rem 1.5rem; }
            .entry:hover .pane,
            .entry .pane:hover { flex: 1; }
            .pane .enter { opacity: 1; transform: translateY(0); }
            .entry::after {
                left: 0; right: 0; top: 50%; bottom: auto;
                width: 100%; height: 1px;
            }
        }
    </style>
</head>

<body>
    <div class="entry">
        <a href="./engineer/" class="pane engineer">
            <span class="corner">// kyren · engineer</span>
            <span class="title">Engineer</span>
            <span class="subtitle">ML compiler · edge AI · C++ / Python</span>
            <span class="enter">enter →</span>
        </a>
        <a href="./private/" class="pane private">
            <span class="corner">kei · private</span>
            <span class="title">Private</span>
            <span class="subtitle">写真 · 夜景 · コーヒー · 海鮮</span>
            <span class="enter">enter →</span>
        </a>
    </div>
</body>

</html>
